name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx @cloudflare/next-on-pages

      - name: Configure KV Binding via API
        run: |
          curl -s -X PATCH "https://api.cloudflare.com/client/v4/accounts/970f447f7ce353f4561e125abfe42102/pages/projects/hongtexus-cn"             -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}"             -H "Content-Type: application/json"             -d '{"deployment_configs":{"production":{"kv_namespaces":{"HONGTE_KV":{"namespace_id":"4f0cc3f6db124d23ae17d3fb59d521d2"}}}}}'

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 970f447f7ce353f4561e125abfe42102
          command: pages deploy .vercel/output/static --project-name hongtexus-cn
